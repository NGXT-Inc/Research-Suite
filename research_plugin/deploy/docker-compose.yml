# Local full-stack bring-up of the Research Plugin control plane (plan Phase 9).
#
# Wires the control plane to Postgres (the record store) and MinIO (the S3-shape
# blob store) so the whole cloud topology runs on a laptop. This is the
# REFERENCE stack for development and testing — NOT a managed deploy (no TLS, no
# managed Postgres, no secret store, no cleanup scheduler; see deploy/README.md).
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# Then point a daemon / proxy at http://localhost:8787
# (RESEARCH_PLUGIN_CONTROL_URL).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rp
      POSTGRES_PASSWORD: rp_dev_password
      POSTGRES_DB: research_plugin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rp -d research_plugin"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the separate MLflow database. MLflow owns generic table
  # names, so keep it out of the Research Plugin record-store database.
  mlflowdb:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: rp_dev_password
    entrypoint: >
      /bin/sh -c "
      createdb -h postgres -U rp mlflow 2>/dev/null || true &&
      echo 'mlflow database ready';
      "

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rpminio
      MINIO_ROOT_PASSWORD: rpminio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the blob/storage buckets the control plane expects, then exit.
  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 rpminio rpminio_dev_password &&
      mc mb --ignore-existing local/research-plugin-blobs &&
      mc mb --ignore-existing local/research-plugin-storage &&
      mc mb --ignore-existing local/research-plugin-mlflow-artifacts &&
      echo 'bucket ready';
      "

  mlflow:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mlflow
    depends_on:
      mlflowdb:
        condition: service_completed_successfully
      createbucket:
        condition: service_completed_successfully
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://rp:rp_dev_password@postgres:5432/mlflow
      MLFLOW_ARTIFACTS_DESTINATION: s3://research-plugin-mlflow-artifacts
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: rpminio
      AWS_SECRET_ACCESS_KEY: rpminio_dev_password
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL_S3: http://minio:9000
    entrypoint: >
      /bin/sh -c "
      python -m mlflow server \
        --host 0.0.0.0 \
        --port 5000 \
        --backend-store-uri \"$${MLFLOW_BACKEND_STORE_URI}\" \
        --artifacts-destination \"$${MLFLOW_ARTIFACTS_DESTINATION}\" \
        --serve-artifacts;
      "
    ports:
      - "5000:5000"

  # One-shot: create a dev-only management SSH key in a named volume. Managed
  # deploys should replace this with an orchestrator/secret-manager mount.
  mgmtkey:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    user: "0:0"
    entrypoint: >
      /bin/sh -c "
      mkdir -p /run/secrets/research_plugin_mgmt_key &&
      if [ ! -f /run/secrets/research_plugin_mgmt_key/key ]; then
        ssh-keygen -t ed25519 -N '' -q -C research-plugin-dev-mgmt -f /run/secrets/research_plugin_mgmt_key/key;
      fi &&
      chown 10001:10001 /run/secrets/research_plugin_mgmt_key/key /run/secrets/research_plugin_mgmt_key/key.pub &&
      chmod 600 /run/secrets/research_plugin_mgmt_key/key &&
      chmod 644 /run/secrets/research_plugin_mgmt_key/key.pub &&
      echo 'management key ready';
      "
    volumes:
      - mgmtkey:/run/secrets/research_plugin_mgmt_key

  control:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
      mgmtkey:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    environment:
      RESEARCH_PLUGIN_MODE: control
      RESEARCH_PLUGIN_HTTP_HOST: 0.0.0.0
      RESEARCH_PLUGIN_HTTP_PORT: 8787
      # Browser origins allowed by CORS: the hosted UI (Vercel) + the control
      # plane's own host + local dev. Override with RESEARCH_PLUGIN_ALLOWED_ORIGINS
      # in the environment if a deployment needs a different set.
      RESEARCH_PLUGIN_ALLOWED_ORIGINS: ${RESEARCH_PLUGIN_ALLOWED_ORIGINS:-https://experiments.rapidreview.io,https://research-suite-chi.vercel.app,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
      # Record store: the Postgres dialect (cloud plan Phase 6).
      RESEARCH_PLUGIN_DB_URL: postgresql://rp:rp_dev_password@postgres:5432/research_plugin
      # Blob store: the S3-shape bucket on MinIO (cloud plan Phase 8). boto3
      # reads these standard AWS env vars; the endpoint URL points it at MinIO.
      RESEARCH_PLUGIN_BLOB_BUCKET: research-plugin-blobs
      # Heavy-file storage: optional feature, enabled here through the same
      # S3-compatible path used for R2/S3 production deployments.
      RESEARCH_PLUGIN_STORAGE_PROVIDER: s3
      RESEARCH_PLUGIN_STORAGE_BUCKET: research-plugin-storage
      RESEARCH_PLUGIN_STORAGE_ENDPOINT_URL: http://minio:9000
      RESEARCH_PLUGIN_STORAGE_REGION: us-east-1
      # Centralized MLflow: tracking/dashboard URLs are reported to agents.
      # Override the tracking URI to the public HTTPS host for remote sandboxes.
      RESEARCH_PLUGIN_MLFLOW_MODE: external
      RESEARCH_PLUGIN_MLFLOW_TRACKING_URI: ${RESEARCH_PLUGIN_MLFLOW_TRACKING_URI:-}
      RESEARCH_PLUGIN_MLFLOW_SERVER_URI: ${RESEARCH_PLUGIN_MLFLOW_SERVER_URI:-http://mlflow:5000}
      RESEARCH_PLUGIN_MLFLOW_DASHBOARD_URL: ${RESEARCH_PLUGIN_MLFLOW_DASHBOARD_URL:-}
      # Dev-only mounted management key from the mgmtkey one-shot above.
      RESEARCH_PLUGIN_MGMT_KEY_PATH: /run/secrets/research_plugin_mgmt_key/key
      AWS_ACCESS_KEY_ID: rpminio
      AWS_SECRET_ACCESS_KEY: rpminio_dev_password
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL_S3: http://minio:9000
      # Provider creds come from the env / a secret store ONLY in control mode
      # (.env discovery is disabled). Leave unset for a record-only dev stack;
      # set THUNDER_* / MODAL_* / LAMBDA_* (and HF_TOKEN) to provision sandboxes.
    ports:
      - "8787:8787"
    volumes:
      - mgmtkey:/run/secrets/research_plugin_mgmt_key:ro

volumes:
  pgdata:
  miniodata:
  mgmtkey:
