iles stay local</text><rect x="360" y="196" width="160" height="64" rx="10" fill="#3f4348" stroke="#26282c" stroke-width="1.5"/><text x="440" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">MCP proxy</text><text x="440" y="243" text-anchor="middle" font-size="11" fill="#cfd2d6">repo files · SSH keys</text><rect x="608" y="84" width="336" height="56" rx="10" fill="#ffffff" stroke="#f2c3aa" stroke-width="1.5"/><text x="776" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#c24d1e">Frontend UI</text><text x="776" y="131" text-anchor="middle" font-size="11" fill="#bd7a58">read-only · for humans</text><rect x="608" y="196" width="336" height="64" rx="10" fill="#ff6b35" stroke="#e0521d" stroke-width="1.5"/><text x="776" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Brain</text><text x="776" y="243" text-anchor="middle" font-size="11" fill="#ffe1d4">owns all research state</text><rect x="608" y="340" width="200" height="56" rx="10" fill="#767b83" stroke="#5a5f66" stroke-width="1.5"/><text x="708" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">GPU sandboxes</text><text x="708" y="387" text-anchor="middle" font-size="11" fill="#e3e5e8">Lambda · Thunder · Modal</text><rect x="838" y="340" width="130" height="56" rx="10" fill="#767b83" stroke="#5a5f66" stroke-width="1.5"/><text x="903" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Storage</text><text x="903" y="387" text-anchor="middle" font-size="11" fill="#e3e5e8">artifacts</text><path d="M 440 140 L 440 192" fill="none" stroke="#5b5b5b" stroke-width="1.5" marker-end="url(#fwd)"/><text x="0" y="0" text-anchor="middle" font-size="11" fill="#555555"></text><path d="M 356 228 L 214 228" fill="none" stroke="#5b5b5b" stroke-width="1.5" marker-end="url(#fwd)"/><text x="0" y="0" text-anchor="middle" font-size="11" fill="#555555"></text><path d="M 524 228 L 602 228" fill="none" stroke="#5b5b5b" 