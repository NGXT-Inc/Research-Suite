<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 992 256" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="Project workflow: completed experiments fan out to five reflection lenses, then synthesis, adversarial review, and publish; rejected reviews send work back to synthesis or the lenses"><defs><marker id="fwd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6e7781"/></marker><marker id="ret" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/></marker></defs><text x="24" y="32" font-size="12" fill="#59636e">solid arrow = forward · dashed = review sends work back · purple = adversarial review</text><rect x="24" y="64" width="160" height="64" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5" stroke-dasharray="5 4"/><text x="104" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#59636e">Completed work</text><text x="104" y="111" text-anchor="middle" font-size="11" fill="#818b95">a wave of experiments</text><rect x="220" y="64" width="160" height="64" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/><text x="300" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">Reflection fan-out</text><text x="300" y="111" text-anchor="middle" font-size="11" fill="#59636e">5 lenses in parallel</text><rect x="416" y="64" width="160" height="64" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/><text x="496" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">Synthesis</text><text x="496" y="111" text-anchor="middle" font-size="11" fill="#59636e">report · graph · spec</text><rect x="612" y="64" width="160" height="64" rx="10" fill="#f1eafe" stroke="#c9b3f5" stroke-width="1.5"/><text x="692" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#5b3fbc">Reflection review</text><text x="692" y="111" text-anchor="middle" font-size="11" fill="#8a76c9">adversarial check</text><rect x="808" y="64" width="160" height="64" rx="10" fill="#e9f7ef" stroke="#8fd6ac" stroke-width="1.5"/><text x="888" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#1a7f4b">Publish</text><text x="888" y="111" text-anchor="middle" font-size="11" fill="#549f77">sets up the next wave</text><line x1="186" y1="96" x2="217" y2="96" stroke="#6e7781" stroke-width="1.5" marker-end="url(#fwd)"/><line x1="382" y1="96" x2="413" y2="96" stroke="#6e7781" stroke-width="1.5" marker-end="url(#fwd)"/><line x1="578" y1="96" x2="609" y2="96" stroke="#6e7781" stroke-width="1.5" marker-end="url(#fwd)"/><line x1="774" y1="96" x2="805" y2="96" stroke="#6e7781" stroke-width="1.5" marker-end="url(#fwd)"/><path d="M 680 128 C 680 185, 496 185, 496 136" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ret)"/><text x="588" y="190" text-anchor="middle" font-size="11" fill="#59636e">revise synthesis</text><path d="M 704 128 C 704 235, 300 235, 300 136" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ret)"/><text x="502" y="224" text-anchor="middle" font-size="11" fill="#59636e">lenses fall short</text></svg>
