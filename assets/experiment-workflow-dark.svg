<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 992 256" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="Experiment workflow: plan, design review, execute, results review, complete; rejected reviews send work back to execution or planning"><defs><marker id="fwd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/></marker><marker id="ret" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/></marker></defs><text x="24" y="32" font-size="12" fill="#9198a1">solid arrow = forward · dashed = review sends work back · purple = adversarial review</text><rect x="24" y="64" width="160" height="64" rx="10" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/><text x="104" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Plan</text><text x="104" y="111" text-anchor="middle" font-size="11" fill="#9198a1">write the experiment plan</text><rect x="220" y="64" width="160" height="64" rx="10" fill="#221a38" stroke="#6e40c9" stroke-width="1.5"/><text x="300" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#c3aaf9">Design review</text><text x="300" y="111" text-anchor="middle" font-size="11" fill="#9d89d8">the plan must pass</text><rect x="416" y="64" width="160" height="64" rx="10" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/><text x="496" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Execute</text><text x="496" y="111" text-anchor="middle" font-size="11" fill="#9198a1">run in a sandbox</text><rect x="612" y="64" width="160" height="64" rx="10" fill="#221a38" stroke="#6e40c9" stroke-width="1.5"/><text x="692" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#c3aaf9">Results review</text><text x="692" y="111" text-anchor="middle" font-size="11" fill="#9d89d8">the report must pass</text><rect x="808" y="64" width="160" height="64" rx="10" fill="#122b1d" stroke="#2ea043" stroke-width="1.5"/><text x="888" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#72dd9d">Complete</text><text x="888" y="111" text-anchor="middle" font-size="11" fill="#5aa878">findings recorded</text><line x1="186" y1="96" x2="217" y2="96" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><line x1="382" y1="96" x2="413" y2="96" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><line x1="578" y1="96" x2="609" y2="96" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><line x1="774" y1="96" x2="805" y2="96" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><path d="M 300 128 C 300 190, 104 190, 104 136" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ret)"/><text x="202" y="194" text-anchor="middle" font-size="11" fill="#9198a1">revise the plan</text><path d="M 680 128 C 680 190, 496 190, 496 136" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ret)"/><text x="588" y="194" text-anchor="middle" font-size="11" fill="#9198a1">fix run or report</text><path d="M 704 128 C 704 250, 80 250, 80 136" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ret)"/><text x="392" y="236" text-anchor="middle" font-size="11" fill="#9198a1">experiment proved faulty</text></svg>
