<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 992 256" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="Project workflow: completed experiments fan out to five reflection lenses, then synthesis, adversarial review, and publish; rejected reviews send work back to synthesis or the lenses"><defs><marker id="fwd" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/></marker><marker id="ret" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/></marker></defs><text x="24" y="32" font-size="12" fill="#9198a1">solid arrow = forward · dashed = review sends work back · purple = adversarial review</text><rect x="24" y="64" width="160" height="64" rx="10" fill="#0d1117" stroke="#3d444d" stroke-width="1.5" stroke-dasharray="5 4"/><text x="104" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#9198a1">Completed work</text><text x="104" y="111" text-anchor="middle" font-size="11" fill="#6e7781">a wave of experiments</text><rect x="220" y="64" width="160" height="64" rx="10" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/><text x="300" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Reflection fan-out</text><text x="300" y="111" text-anchor="middle" font-size="11" fill="#9198a1">5 lenses in parallel</text><rect x="416" y="64" width="160" height="64" rx="10" fill="#161b22" stroke="#3d444d" stroke-width="1.5"/><text x="496" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#e6edf3">Synthesis</text><text x="496" y="111" text-anchor="middle" font-size="11" fill="#9198a1">report · graph · spec</text><rect x="612" y="64" width="160" height="64" rx="10" fill="#221a38" stroke="#6e40c9" stroke-width="1.5"/><text x="692" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#c3aaf9">Reflection review</text><text x="692" y="111" text-anchor="middle" font-size="11" fill="#9d89d8">adversarial check</text><rect x="808" y="64" width="160" height="64" rx="10" fill="#122b1d" stroke="#2ea043" stroke-width="1.5"/><text x="888" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#72dd9d">Publish</text><text x="888" y="111" text-anchor="middle" font-size="11" fill="#5aa878">sets up the next wave</text><line x1="186" y1="96" x2="217" y2="96" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><line x1="382" y1="96" x2="413" y2="96" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><line x1="578" y1="96" x2="609" y2="96" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><line x1="774" y1="96" x2="805" y2="96" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><path d="M 680 128 C 680 185, 496 185, 496 136" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ret)"/><text x="588" y="190" text-anchor="middle" font-size="11" fill="#9198a1">revise synthesis</text><path d="M 704 128 C 704 235, 300 235, 300 136" fill="none" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ret)"/><text x="502" y="224" text-anchor="middle" font-size="11" fill="#9198a1">lenses fall short</text></svg>
