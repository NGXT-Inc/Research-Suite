iles stay local</text><rect x="360" y="196" width="160" height="64" rx="10" fill="#495059" stroke="#8a929c" stroke-width="1.5"/><text x="440" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">MCP proxy</text><text x="440" y="243" text-anchor="middle" font-size="11" fill="#c9ced4">repo files · SSH keys</text><rect x="608" y="84" width="336" height="56" rx="10" fill="#1d1712" stroke="#7a4426" stroke-width="1.5"/><text x="776" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#ff9d73">Frontend UI</text><text x="776" y="131" text-anchor="middle" font-size="11" fill="#c98d6e">read-only · for humans</text><rect x="608" y="196" width="336" height="64" rx="10" fill="#e85d2c" stroke="#ff8a5e" stroke-width="1.5"/><text x="776" y="224" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Brain</text><text x="776" y="243" text-anchor="middle" font-size="11" fill="#ffd9c7">owns all research state</text><rect x="608" y="340" width="200" height="56" rx="10" fill="#4d5157" stroke="#75797f" stroke-width="1.5"/><text x="708" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#e8eaec">GPU sandboxes</text><text x="708" y="387" text-anchor="middle" font-size="11" fill="#b4b8bd">Lambda · Thunder · Modal</text><rect x="838" y="340" width="130" height="56" rx="10" fill="#4d5157" stroke="#75797f" stroke-width="1.5"/><text x="903" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#e8eaec">Storage</text><text x="903" y="387" text-anchor="middle" font-size="11" fill="#b4b8bd">artifacts</text><path d="M 440 140 L 440 192" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="0" y="0" text-anchor="middle" font-size="11" fill="#9aa0a6"></text><path d="M 356 228 L 214 228" fill="none" stroke="#8b949e" stroke-width="1.5" marker-end="url(#fwd)"/><text x="0" y="0" text-anchor="middle" font-size="11" fill="#9aa0a6"></text><path d="M 524 228 L 602 228" fill="none" stroke="#8b949e" 